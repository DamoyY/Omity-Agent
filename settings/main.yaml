# SQL 文件、LangGraph checkpoint 与运行日志的根目录。
paths:
  dataDir: ./data

# 模型配置；默认兼容 OpenAI 与 OpenAI-compatible 网关。
model:
  provider: cockpit
  # 可选 responses 或 completions；OpenAI-compatible 网关通常使用 completions。
  api: responses
  model: gpt-5.5
  apiKeyEnv: COCKPIT_API_KEY
  baseURL: http://localhost:40403/v1
  maxRetries: 5
  timeoutMs: 120000

# Host 轮询、暂停与 LangGraph 运行边界。
host:
  pollMs: 300
  pausePollMs: 500
  idleLogMs: 5000
  recursionLimit: 25

# 控制台日志层级；debug 会打印最详细的图执行事件。
logging:
  level: debug
  streamTokens: true
