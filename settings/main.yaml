# SQL 文件、LangGraph checkpoint 与运行日志的根目录。
paths:
  dataDir: ${appData}/omity-agent

# 模型配置；provider 为 codex 时固定使用 Responses API，并从
# ~/.codex/auth.json 读取认证，此时省略 api、apiKeyEnv 和 baseURL。
model:
  provider: openai-compatible
  # 可选 responses 或 completions；OpenAI-compatible 网关通常使用 completions。
  api: responses
  model: gpt-5.6-sol
  apiKeyEnv: 78CODE
  baseURL: https://api.78code.cc/v1
  reasoning_effort: xhigh
  maxRetries: 1
  timeoutMs: 120000

# Host 轮询、暂停与 LangGraph 运行边界。
host:
  pollMs: 300
  pausePollMs: 500
  idleLogMs: 25000
  recursionLimit: 25

# 控制台日志层级。
logging:
  level: debug
  streamTokens: true

# Host 所有权与 Hook 调用的租约有效期；执行中会按三分之一周期续租。
leases:
  hostTtlMs: 30000
  hookTtlMs: 30000

# 工具输出超过该 token 数时写入文件，仅把文件路径发送回模型。
toolOutput:
  maxTokens: 8192

# 自动工具调用规则位于 settings/hooks.yaml。

# Skills 控制；directory 用于读取 Skill 子目录中的 SKILL.md。
skills:
  enabled: true
  directory: ~/.agents/skills
  # 未列出的 Skill 默认启用；设置为 false 可单独关闭。
  skillEnabled: {}
