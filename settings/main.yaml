# SQL 文件、LangGraph checkpoint 与运行日志的根目录。
paths:
  dataDir: ${appData}/omity-agent

# 输入草稿保存防抖，以及流式事件触发 Transcript 刷新的最小间隔。
frontend:
  draftSaveDelayMs: 500
  transcriptRefreshIntervalMs: 75

# Host 轮询、暂停与 LangGraph 运行边界。
host:
  pollMs: 300
  pausePollMs: 500
  idleLogMs: 25000
  recursionLimit: 25

# 控制台日志层级。
logging:
  level: debug
  streamTokens: true

# Host 所有权与 Hook 调用的租约有效期；执行中会按三分之一周期续租。
leases:
  hostTtlMs: 30000
  hookTtlMs: 30000

# 工具输出超过该 token 数时写入文件，仅把文件路径发送回模型。
toolOutput:
  maxTokens: 8192

# 自动工具调用规则位于 settings/hooks.yaml。

# Skills 控制；directory 用于读取 Skill 子目录中的 SKILL.md。
skills:
  enabled: true
  directory: ~/.agents/skills
  # 未列出的 Skill 默认启用；设置为 false 可单独关闭。
  skillEnabled: {}
