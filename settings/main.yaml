# SQL 文件、LangGraph checkpoint 与运行日志的根目录。
paths:
  dataDir: ${appData}/omity-agent

# 公网访问控制。publicOrigin 填写反向代理暴露的 HTTPS Origin，例如 https://omity.example.com。
# 启用 publicOrigin 时必须填写 trustedProxies；代理需保留 Host 并覆盖或正确追加 X-Forwarded-For。
# 客户端地址链从右向左解析，取最近的非可信地址。
access:
  publicOrigin: null
  trustedProxies: []
  challengeTtlMs: 300000
  sessionTtlMs: 43200000
  loginRateLimit:
    attempts: 10
    windowMs: 60000

# 粘贴到消息输入框的文件限制；后缀匹配不区分大小写，大小限制同时约束单个文件和单次发送总量。
attachments:
  allowedSuffixes:
    - .txt
    - .md
    - .json
    - .yaml
    - .yml
    - .csv
    - .log
    - .pdf
    - .png
    - .jpg
    - .jpeg
    - .webp
  maxSizeBytes: 10485760

# 输入草稿保存防抖，以及流式事件触发 Transcript 刷新的最小间隔。
frontend:
  draftSaveDelayMs: 500
  transcriptRefreshIntervalMs: 75

# Host 轮询、暂停与 LangGraph 运行边界。
host:
  pollMs: 300
  pausePollMs: 500
  idleLogMs: 25000
  recursionLimit: 25
  # 收到关闭信号后等待当前模型或工具到达可恢复边界的最长时间。
  shutdownTimeoutMs: 10000

# 控制台日志层级。
logging:
  level: debug
  streamTokens: true

# Host 所有权与 Hook 调用的租约有效期；执行中会按三分之一周期续租。
leases:
  hostTtlMs: 30000

# 工具输出超过该 token 数时写入文件，仅把文件路径发送回模型。
toolOutput:
  maxTokens: 10000

# 自动工具调用规则位于 settings/hooks.yaml。

# Skills 控制；directory 用于读取 Skill 子目录中的 SKILL.md。
skills:
  enabled: true
  directory: ~/.agents/skills
  # 未列出的 Skill 默认启用；设置为 false 可单独关闭。
  skillEnabled: {}
