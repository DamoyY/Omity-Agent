# 当前启用的模型 Profile；值必须匹配 profiles 下的名称。
profile: 78code

profiles:
  # adapter 可选 responses、completions 或 codex。codex 固定使用 Responses
  # API 并从 ~/.codex/auth.json 读取认证，此时省略 apiKeyEnv 和 baseURL。
  78code:
    adapter: responses
    model: gpt-5.6-sol
    apiKeyEnv: 78CODE
    baseURL: https://api.78code.cc/v1
    reasoning_effort: xhigh
    maxRetries: 1
    timeoutMs: 120000
  codex:
    adapter: codex
    model: gpt-5.6-sol
    reasoning_effort: xhigh
    maxRetries: 1
    timeoutMs: 120000
