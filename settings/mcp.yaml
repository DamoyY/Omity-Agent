# 默认不加载任何工具。
# 添加 MCP 服务器后，Host 启动时会将这些工具接入 Agent。

# 示例：
# mcpServers:
#   brave:
#     transport: stdio
#     command: npx
#     args:
#       - -y
#       - "@modelcontextprotocol/server-brave-search"
#     env:
#       BRAVE_API_KEY: ${BRAVE_API_KEY}
#
# 可选：自定义 MCP 工具名，键是原始的自动生成工具名，值是对 Agent 暴露的工具名。
# toolNameOverrides:
#   brave__brave_web_search: web_search
#
# 可选：将仅有一个字符串参数的工具作为 free-form 工具暴露给模型。
# 工具名使用重命名后的最终名称。
# freeformToolInputs:
#   - apply_patch

mcpServers:
  web:
    transport: stdio
    command: F:/workspace/web-rs/target/release/web-rs.exe
    args:
      - --transport
      - stdio
      - --exa-api-key
      - ${EXA_API_KEY}
      - --tinyfish-api-key
      - ${TINYFISH_API_KEY}
  terminal:
    transport: stdio
    command: F:/workspace/FuncTerm/target/release/functerm.exe
    args:
      - mcp
  diff:
    transport: stdio
    command: F:/workspace/apply-patch-mcp/target/release/apply-patch-mcp.exe
    args: []
  codegraph:
    transport: stdio
    command: codegraph
    args:
      - serve
      - --mcp
    env:
      CODEGRAPH_MCP_TOOLS: explore,node,search,callers,callees,impact,codegraph_explore,codegraph_node,codegraph_search,codegraph_callers,codegraph_callees,codegraph_impact
  capture:
    transport: stdio
    command: F:/workspace/windows_capture/target/release/WinCapture.exe
  image_viewer:
    transport: stdio
    command: F:/workspace/image-viewer-mcp/target/release/image-viewer-mcp.exe
    args:
      - --config
      - F:/workspace/image-viewer-mcp/settings.yaml

toolNameOverrides:
  diff__apply_patch: apply_patch
  codegraph__codegraph_explore: codegraph_explore
  codegraph__codegraph_node: codegraph_node
  codegraph__codegraph_search: codegraph_search
  codegraph__codegraph_callers: codegraph_callers
  codegraph__codegraph_callees: codegraph_callees
  codegraph__codegraph_impact: codegraph_impact
  image_viewer__view_images: view_images

freeformToolInputs:
  - apply_patch
