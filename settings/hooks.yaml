# Hook 按配置顺序执行；工具名使用重命名后的最终 MCP 工具名。
# id 必须唯一；args 支持任意深度的变量：
# - ${cwd}: 当前会话的用户工作目录
# - ${previousTool.output}: 前一个工具的 ToolMessage.content
# - ${previousTool.structuredOutput}: 前一个 MCP 工具的结构化输出
# 变量独占参数值时保留原始类型；嵌入字符串时只能使用标量输出。
#
# hooks:
#   - id: format-after-user
#     target: agent
#     when: before
#     mode: silent
#     tool: formatter
#     args: { path: "${cwd}" }
#   - id: notify-after-answer
#     target: agent
#     when: after
#     mode: silent
#     tool: notify
#     args: { result: "${previousTool.output}" }
#   - id: check-before-write
#     target: write_file
#     when: before
#     mode: takeover
#     tool: validate
#     args: {}
#   - id: format-after-write
#     target: write_file
#     when: after
#     mode: silent
#     tool: formatter
#     args: { path: . }
hooks:
  - id: open-terminal
    target: agent
    when: before
    mode: takeover
    tool: terminal__new_tab
    args:
      starting_directory: "${cwd}"
      starting_shell: powershell
  - id: read-agents-md
    target: agent
    when: before
    mode: takeover
    tool: terminal__send_command
    args:
      tab_id: "${previousTool.structuredOutput.tab_id}"
      command: Get-Content -LiteralPath .\AGENTS.md -Raw
      waiting: 5
